<script>
    const sosBtn = document.getElementById('sos-trigger');
    const sosFill = document.getElementById('sos-fill');
    const sosText = document.getElementById('sos-text');
    const sosContent = document.getElementById('sos-content');
    const sosSuccess = document.getElementById('sos-success');
    
    let holdTimer;
    const holdDuration = 2000; // 2 seconds
    let startTime;

    function handleStart(e) {
        if (sosBtn.classList.contains('sent')) return;
        
        startTime = Date.now();
        sosBtn.classList.add('scale-95');
        sosBtn.classList.remove('pulse-button');
        sosFill.style.transitionDuration = holdDuration + 'ms';
        sosFill.style.width = '100%';
        
        holdTimer = setTimeout(() => {
            dispatchSOS();
        }, holdDuration);
    }

    function handleEnd() {
        if (sosBtn.classList.contains('sent')) return;

        clearTimeout(holdTimer);
        sosBtn.classList.remove('scale-95');
        sosBtn.classList.add('pulse-button');
        sosFill.style.transitionDuration = '300ms';
        sosFill.style.width = '0%';
    }

    function dispatchSOS() {
        sosBtn.classList.add('sent');
        sosBtn.classList.remove('pulse-button');
        sosBtn.classList.replace('bg-error-container/90', 'bg-green-600');
        
        sosFill.style.width = '0%';
        sosText.textContent = 'SENDING...';
        
        // Success animation sequence
        setTimeout(() => {
            sosContent.classList.add('-translate-y-full', 'opacity-0');
            sosSuccess.classList.remove('translate-y-full');
            
            // Optional: Trigger phone vibration if available
            if ("vibrate" in navigator) {
                navigator.vibrate([200, 100, 200]);
            }
        }, 500);
    }

    sosBtn.addEventListener('mousedown', handleStart);
    sosBtn.addEventListener('mouseup', handleEnd);
    sosBtn.addEventListener('mouseleave', handleEnd);
    
    sosBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        handleStart();
    }, { passive: false });
    sosBtn.addEventListener('touchend', handleEnd);

    // Horizontal scroll momentum and styling for pills
    const scroller = document.querySelector('.no-scrollbar');
    let isDown = false;
    let startX;
    let scrollLeft;

    scroller.addEventListener('mousedown', (e) => {
        isDown = true;
        startX = e.pageX - scroller.offsetLeft;
        scrollLeft = scroller.scrollLeft;
    });
    scroller.addEventListener('mouseleave', () => isDown = false);
    scroller.addEventListener('mouseup', () => isDown = false);
    scroller.addEventListener('mousemove', (e) => {
        if (!isDown) return;
        e.preventDefault();
        const x = e.pageX - scroller.offsetLeft;
        const walk = (x - startX) * 2;
        scroller.scrollLeft = scrollLeft - walk;
    });
</script>
