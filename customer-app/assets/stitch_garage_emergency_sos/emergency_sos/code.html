<script>
        const sosBtn = document.getElementById('sos-trigger');
        const sosProgress = document.getElementById('sos-progress');
        let timer;

        sosBtn.addEventListener('mousedown', startPress);
        sosBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startPress();
        });

        sosBtn.addEventListener('mouseup', endPress);
        sosBtn.addEventListener('mouseleave', endPress);
        sosBtn.addEventListener('touchend', endPress);

        function startPress() {
            sosBtn.classList.add('brightness-125');
            sosProgress.style.width = '100%';
            timer = setTimeout(() => {
                alert('🚨 EMERGENCY SOS DISPATCHED 🚨\nA technician and emergency responders are being routed to your GPS location.');
                endPress();
            }, 3000);
        }

        function endPress() {
            sosBtn.classList.remove('brightness-125');
            sosProgress.style.width = '0%';
            clearTimeout(timer);
        }

        // Horizontal scroll momentum and styling
        const scroller = document.querySelector('.no-scrollbar');
        let isDown = false;
        let startX;
        let scrollLeft;

        scroller.addEventListener('mousedown', (e) => {
            isDown = true;
            startX = e.pageX - scroller.offsetLeft;
            scrollLeft = scroller.scrollLeft;
        });
        scroller.addEventListener('mouseleave', () => isDown = false);
        scroller.addEventListener('mouseup', () => isDown = false);
        scroller.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - scroller.offsetLeft;
            const walk = (x - startX) * 2;
            scroller.scrollLeft = scrollLeft - walk;
        });
    </script>
